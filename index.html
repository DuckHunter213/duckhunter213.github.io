<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Digital | Luis Fernando Gomez Alejandre</title>
    <meta
      name="description"
      content="CV digital adaptable por perfil para roles tech. Experiencia, proyectos, estudios, certificaciones y stack cargados desde JSON en una web estatica."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="app.css">
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <main class="page">
        <section class="hero" id="hero"></section>
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">CV adaptable</p>
              <h2>Enfoca tu perfil segun la vacante</h2>
              <p class="panel-copy">
                El contenido se prioriza por experiencia relevante y el enlace se puede compartir con el perfil activo.
              </p>
            </div>
            <button class="ghost-button" id="share-profile-link" type="button">
              Copiar link del perfil
            </button>
          </div>
          <div class="toolbar-row">
            <div class="language-switcher" id="language-switcher"></div>
          </div>
          <div class="profile-switcher" id="profile-switcher"></div>
        </section>

        <section class="grid">
          <div class="main-column">
            <section class="panel" id="experience-section"></section>
            <section class="panel" id="projects-section"></section>
            <section class="panel" id="education-section"></section>
          </div>

          <aside class="side-column">
            <section class="panel" id="skills-section"></section>
            <section class="panel" id="certifications-section"></section>
            <section class="panel" id="courses-section"></section>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
